name: SonyLiv Auto Update (Lite)

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */1 * * *' # প্রতি ১ ঘণ্টা পর পর (আপনার ইচ্ছা অনুযায়ী পরিবর্তন করতে পারেন)

jobs:
  update-sonyliv:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 চেকআউট পাবলিক রিপোজিটরি (SonyLiv)
        uses: actions/checkout@v4

      - name: 🔐 চেকআউট প্রাইভেট রিপোজিটরি (Sports - Script Only)
        uses: actions/checkout@v4
        with:
          repository: srhady/Sports
          token: ${{ secrets.PAT_TOKEN }}
          path: private_sports_repo

      - name: 🐍 পাইথন সেটআপ
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 ডিপেন্ডেন্সি ইনস্টল
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: 🚀 SonyLiv স্ক্রিপ্ট রান করা
        run: |
          cd private_sports_repo
          python sonyliv_bot.py

      - name: 🚚 পাবলিক রিপোতে প্লেলিস্ট কপি করা
        run: |
          cp private_sports_repo/sonyliv_playlist.m3u ./ || true
          cp private_sports_repo/sonyliv_playlist.json ./ || true

      - name: 🧹 রানার থেকে প্রাইভেট ডাটা মুছে ফেলা (Security)
        run: rm -rf private_sports_repo

      - name: 🕒 README-তে বিডি সময় আপডেট করা
        run: |
          CUR_TIME=$(TZ='Asia/Dhaka' date +'%I:%M %p, %d %b %Y')
          # আপনার README-তে থাকা ব্যাজ লিংকের প্যাটার্ন ঠিক রাখতে sed ব্যবহার
          sed -i "s|last--commit--time-.*-blue|last--commit--time-${CUR_TIME// /%20}-blue|g" README.md || true

      - name: 💾 প্লেলিস্ট গিটহাবে পুশ করা (SonyLiv)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add sonyliv_playlist.m3u sonyliv_playlist.json README.md || true
          
          # যদি কোনো পরিবর্তন না থাকে তবে এরর ছাড়াই পরের ধাপে যাবে
          git commit -m "Auto Update SonyLiv: $(TZ='Asia/Dhaka' date +'%I:%M %p')" || echo "No changes to commit"
          
          git pull --rebase --autostash origin main
          git push

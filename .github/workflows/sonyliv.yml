name: SonyLIV Public Playlist Updater

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর রান করবে
  workflow_dispatch: # ম্যানুয়ালি রান করার জন্য

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      # ১. প্রথমে পাবলিক রিপো চেকআউট করা (যেখানে ফাইলগুলো সেভ হবে)
      - name: Checkout Public Repository
        uses: actions/checkout@v4

      # ২. PAT_TOKEN ব্যবহার করে প্রাইভেট রিপো থেকে sonyliv.py ডাউনলোড করা
      - name: Download Script from Private Repo
        run: |
          curl -H "Authorization: token ${{ secrets.PAT_TOKEN }}" \
               -o sonyliv.py \
               -L https://raw.githubusercontent.com/srhady/axsportspvt/main/sonyliv.py

      # ৩. পাইথন সেটআপ
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ৪. প্যাকেজ ইন্সটল
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ৫. প্রাইভেট রিপো থেকে আনা স্ক্রিপ্টটি রান করা
      - name: Run SonyLIV Script
        run: python sonyliv.py

      # ৬. কাজ শেষে শুধু জেনারেট হওয়া ফাইল পাবলিক রিপোতে পুশ করা
      - name: Commit and Push to Public Repo
        run: |
          git config --local user.name "Md Sohanur Rahman Hady"
          git config --local user.email "actions@github.com"
          
          # শুধুমাত্র m3u এবং json ফাইল অ্যাড করা হবে (sonyliv.py অ্যাড হবে না)
          git add sonyliv_live.json sonyliv_live.m3u
          
          # ডাটা পরিবর্তন হলে তবেই পাবলিক রিপোতে কমিট ও পুশ করবে
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Update: SonyLIV Live Playlist" && git push)
          
      # ৭. নিরাপত্তার জন্য রান শেষে ডাউনলোড করা স্ক্রিপ্ট মুছে ফেলা (অপশনাল)
      - name: Cleanup Secret Script
        run: rm -f sonyliv.py
